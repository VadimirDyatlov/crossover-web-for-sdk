<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>ui-forge</title>
    <style>
      :root {
        --sk-color: rgba(0, 0, 0, 0.1);
      }

      #splash {
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top, 0px);
        transition: opacity 0.15s;
      }
      .sk-anim {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .splash-close-btn {
        position: absolute;
        top: calc(2px + env(safe-area-inset-top, 0px));
        left: 8px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #1c1c1c;
        border: none;
        outline: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      /* Header */
      .header-skeleton {
        height: 44px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 8px;
      }
      .header-button {
        width: 100px;
        height: 28px;
        background: var(--sk-color);
        border-radius: 25px;
      }
      /* Merchant Info */
      .merchant-skeleton {
        margin: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .merchant-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .merchant-header {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .merchant-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--sk-color);
        flex-shrink: 0;
      }
      /* Текст задаёт LCP-кандидата уже из HTML, до загрузки JS */
      .merchant-name {
        min-width: 140px;
        height: 30px;
        border-radius: 14px;
        background: var(--sk-color);
        font-size: 16px;
        font-weight: 600;
        line-height: 30px;
        padding: 0 10px;
        color: var(--sk-color);
      }
      .merchant-address {
        width: 140px;
        height: 14px;
        border-radius: 14px;
        background: var(--sk-color);
        margin-top: 2px;
        font-size: 12px;
        line-height: 14px;
        color: var(--sk-color);
      }
      .merchant-chip {
        width: 84px;
        height: 32px;
        border-radius: 16px;
        background: var(--sk-color);
      }
      /* Categories */
      .category-skeleton {
        min-height: 44px;
        display: flex;
        gap: 8px;
        padding: 0 8px;
        align-items: center;
        overflow: hidden;
      }
      .category-pill {
        width: 120px;
        height: 32px;
        border-radius: 16px;
        background: var(--sk-color);
        flex-shrink: 0;
      }
      /* Product Grid */
      .product-grid-skeleton {
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 16px;
        gap: 4px;
      }
      .product-card-sk {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      .product-image-sk {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        background: var(--sk-color);
      }
      .product-title-sk {
        height: 12px;
        border-radius: 4px;
        background: var(--sk-color);
        width: 100%;
      }
      .product-desc-sk {
        height: 12px;
        border-radius: 4px;
        background: var(--sk-color);
        width: 60%;
      }
    </style>
    <link
      rel="preload"
      href="/assets/SBSansText-Regular-DLuYFMsG.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/assets/SBSansText-Semibold-C7QALZzg.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/assets/SBSansDisplay-SemiBold-2xVx6ZnI.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!--
      Спла́ш снаружи #root: React монтируется в пустой #root, спла́ш
      перекрывает его (z-index: 9999) пока App не уберёт его через useEffect.
      Текст в .merchant-name даёт FCP/LCP-кандидата сразу из HTML-ответа,
      без ожидания JS-бандла.
    -->
    <div id="splash" aria-hidden="true">
      <div class="header-skeleton">
        <div class="header-button sk-anim"></div>
      </div>

      <div class="merchant-skeleton">
        <div class="merchant-info">
          <div class="merchant-header">
            <div class="merchant-avatar sk-anim"></div>
            <div class="merchant-name sk-anim">Загружается</div>
          </div>
          <div class="merchant-address sk-anim">Адрес</div>
        </div>
        <div class="merchant-chip sk-anim"></div>
      </div>

      <div class="category-skeleton">
        <div class="category-pill active sk-anim"></div>
        <div class="category-pill sk-anim"></div>
        <div class="category-pill sk-anim"></div>
        <div class="category-pill sk-anim"></div>
      </div>

      <div class="product-grid-skeleton">
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
        <div class="product-card-sk">
          <div class="product-image-sk sk-anim"></div>
          <div class="product-title-sk sk-anim"></div>
          <div class="product-desc-sk sk-anim"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
